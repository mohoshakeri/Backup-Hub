{% extends "base.html" %}

{% block title %}ورود | Backup Hub{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<main class="auth-layout">

    <section class="auth-card">
        <div class="brand-lockup">
            {% if logo_url %}
                <img class="brand-logo" src="{{ logo_url }}" alt="Backup Hub">
            {% else %}
                <div class="brand-logo brand-logo-text">BH</div>
            {% endif %}
            <div>
                <h1>Backup Hub</h1>
            </div>
        </div>
        <div class="section-heading">
        </div>

        {% if error_message %}
            <div class="alert alert-danger">{{ error_message }}</div>
        {% endif %}

        <form class="form-stack" method="post" action="/login" data-loading-form>
            <input type="hidden" name="login_csrf_token" value="{{ login_csrf_token }}">
            <label class="field">
                <span>نام کاربری</span>
                <input name="username" autocomplete="username" required>
            </label>
            <label class="field">
                <span>رمز عبور</span>
                <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <button class="primary-button full" type="submit">
                <span>ورود</span>
                <b class="loader"></b>
            </button>
        </form>
    </section>
</main>
{% endblock %}
